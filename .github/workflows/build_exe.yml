name: Build Windows EXE

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Ejecutar tests
        run: python -m pytest tests -v

      - name: Compilar ejecutable
        run: pyinstaller DocFlow.spec --noconfirm --clean

      - name: Subir EXE como artefacto (siempre)
        uses: actions/upload-artifact@v4
        with:
          name: DocFlow
          path: "dist/DocFlow.exe"
          retention-days: 30

      - name: Subir EXE a la Release (solo si es release)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2.2.1
        with:
          files: "dist/DocFlow.exe"

# ── Para añadir un job macOS en el futuro ─────────────────────────────────────
# Pasos necesarios:
#   1. Añadir un job con `runs-on: macos-latest`.
#   2. El mismo comando `pyinstaller DocFlow.spec --noconfirm --clean` generará
#      dist/DocFlow.app automáticamente gracias al bloque BUNDLE del spec.
#   3. Comprimir el .app antes de subirlo como artefacto:
#        zip -r dist/DocFlow-mac.zip dist/DocFlow.app
#   4. Para distribución pública se requiere firma (codesign) y notarización
#      (notarytool / altool) con un Apple Developer ID. Sin esto, Gatekeeper
#      bloqueará la app en sistemas de terceros.
#   5. Cambiar el bundle identifier "com.docflow.app" por uno basado en el
#      dominio o empresa real antes de iniciar el proceso de firma.
